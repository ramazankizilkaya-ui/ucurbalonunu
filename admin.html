<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğretmen Paneli</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>👨‍🏫 Sınıf Yönetimi</h1>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <button onclick="window.location.href='index.html'" style="background:#34495e; flex: 1;">🏠 Ana Sayfaya Dön</button>
    <button onclick="logout()" style="background:#e74c3c; flex: 1;">🔒 Güvenli Çıkış</button>
</div>
        <button onclick="window.location.href='index.html'" style="background:#34495e; width:100%; margin-bottom:10px;">🏠 Ana Sayfaya Dön</button>
        
        <div class="sky" style="height: 250px; background: linear-gradient(#87CEEB, #E0F7FA); position: relative; border-radius: 15px; border: 2px solid #fff; overflow: hidden; margin-bottom: 20px;">
            <div id="admin-balloon-container"></div>
        </div>

        <div class="form-box">
            <h3>🎯 Haftalık Hedef Tanımla</h3>
            <input type="text" id="hedefAd" placeholder="Hedef (Örn: Tatil Kitabı Bitirme)">
            <input type="number" id="hedefSayfa" placeholder="Sayfa Sayısı">
            <button onclick="hedefKaydet()" style="background:#2ecc71;">Sınıfa Gönder</button>
        </div>

        <div class="leaderboard">
            <h3>📋 Öğrencilerim ve Ödül İşlemleri</h3>
            <div id="admin-student-list"></div>
        </div>
    </div>
    <script src="app.js" defer></script>
</body>
</html>
