<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğretmen Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>👨‍🏫 Sınıf Yönetimi</h2>
        <div class="sky" style="height: 300px; background: skyblue; position: relative; border-radius: 15px; overflow: hidden; margin-bottom: 20px;">
            <div id="admin-balloon-container"></div>
        </div>

        <div class="form-box">
            <h3>📢 Haftalık Hedef / Duyuru</h3>
            <input type="text" id="haftalikHedef" placeholder="Bu haftaki hedef nedir?">
            <button onclick="duyuruYayinla()">Tüm Sınıfa Duyur</button>
        </div>

        <div class="leaderboard">
            <h3>👥 Öğrenci Listesi</h3>
            <div id="admin-student-list"></div>
        </div>

       <div id="okul-ekleme-alani" style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px;">
            <h3>🏫 Yeni Okul Tanımla</h3>
            <select id="yeniOkulIl" onchange="yeniOkulIlceleriYukle()" style="width: 80%; padding: 10px; margin-bottom: 5px;">
                <option value="">İl Seçiniz</option>
            </select>
            <select id="yeniOkulIlce" style="width: 80%; padding: 10px; margin-bottom: 5px;">
                <option value="">İlçe Seçiniz</option>
            </select>
            <input type="text" id="yeniOkulAd" placeholder="Okul Adı (Örn: Simya Koleji)">
            <button onclick="okulEkle()">Sisteme Kaydet</button>
        </div>

        <button onclick="logout()" style="background:red; margin-top:20px;">Çıkış Yap</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
