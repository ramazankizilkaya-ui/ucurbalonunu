<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçur Balonunu | Kitap Okuma Takibi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        
        <div id="auth-area" class="card">
            <div id="role-selection-area">
                <h1>🎈 Uçur Balonunu</h1>
                <p>Kitap okudukça balonunu gökyüzüne gönder!</p>
                <div class="button-group">
                    <button onclick="showRegisterForm('user')">Öğrenci Kaydı</button>
                    <button onclick="showRegisterForm('admin')">Öğretmen Kaydı</button>
                </div>
                <p>Zaten hesabın var mı? <a href="javascript:void(0);" onclick="showLoginForm()">Giriş Yap</a></p>
            </div>

            <div id="dynamic-register-form" style="display:none;">
                <h2>Kayıt Ol</h2>
                <input type="hidden" id="rolSecimi">
                <input type="text" id="ogrenciAdSoyad" placeholder="Adınız Soyadınız">
                <input type="text" id="takmaAd" placeholder="Balon Etiketi (Rumuz)">
                <select id="sehir" onchange="ilceleriYukle()"></select>
                <select id="ilce" onchange="okullariYukle()"></select>
                <select id="okul"></select>
                <div class="row">
                    <input type="number" id="sinif" placeholder="Sınıf">
                    <input type="text" id="sube" placeholder="Şube">
                </div>
                <input type="email" id="email" placeholder="E-posta">
                <input type="password" id="password" placeholder="Şifre">
                <button class="primary-btn" onclick="register()">Kayıt Ol ve Başla</button>
                <button class="secondary-btn" onclick="resetRoleSelection()">Geri</button>
            </div>

            <div id="login-area" style="display:none;">
                <h2>Giriş Yap</h2>
                <input type="email" id="loginEmail" placeholder="E-posta">
                <input type="password" id="loginPassword" placeholder="Şifre">
                <button class="primary-btn" onclick="login()">Giriş Yap</button>
                <button class="secondary-btn" onclick="resetRoleSelection()">Geri</button>
            </div>
        </div>

        <div id="user-panel" class="card" style="display:none;">
            <div class="panel-header">
                <h2 id="welcome-msg">Selam!</h2>
                <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
            </div>
            
            <div id="medalyalar"></div>
            
            <div class="sky-container">
                <div class="sky-bg" id="main-sky">
                    <div id="balloon-container"></div>
                </div>
            </div>
            
            <div class="info-footer">
                <p>Balonun şu an <strong><span id="display-height">0</span> metre</strong> yüksekte!</p>
                <small>⏰ Günde sadece 1 kez giriş yapabilirsin.</small>
                <div class="input-group">
                    <input type="number" id="sayfaSayisi" placeholder="Kaç sayfa okudun?">
                    <button onclick="yukseklikArtir()">Uçur! 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
