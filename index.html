<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçur Balonu</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script src="data.js"></script>
</head>
<body>
    <div class="container">
        <div id="auth-area">
            <h1>🎈 Uçur Balonu</h1>
            <div class="form-box" id="role-selection-area">
                <p>Hesap türünü seçiniz:</p>
                <button onclick="showRegisterForm('ogrenci')" style="background:#3498db;">Öğrenciyim</button>
                <button onclick="showRegisterForm('admin')" style="background:#9b59b6;">Öğretmenim</button>
            </div>

            <div id="dynamic-register-form" class="form-box" style="display: none;">
                <input type="hidden" id="rolSecimi">
                <h3 id="form-title">Kayıt</h3>
                <input type="text" id="ogrenciAdSoyad" placeholder="Ad Soyad">
                <input type="text" id="takmaAd" placeholder="Görünür İsim">
                
                <select id="sehir" onchange="ilceleriYukle()">
                    <option value="">İl Seçiniz</option>
                </select>
                <select id="ilce" disabled>
                    <option value="">İlçe Seçiniz</option>
                </select>
                <select id="okul"></select>

                <div style="display: flex; gap: 5px;">
                    <input type="number" id="sinif" placeholder="Sınıf">
                    <input type="text" id="sube" placeholder="Şube">
                </div>
                
                <input type="email" id="email" placeholder="E-posta">
                <input type="password" id="password" placeholder="Şifre">
                <button onclick="register()" style="background:#27ae60;">Kaydı Tamamla</button>
                <button onclick="resetRoleSelection()">Geri</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
