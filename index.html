<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçan Balon 🎈</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f8ff; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        .btn-blue { background: #3498db; }
        .btn-green { background: #2ecc71; }
        .btn-yellow { background: #f1c40f; color: #333; }
        .btn-red { background: #e74c3c; margin-top: 20px; font-size: 12px; }
        .row { display: flex; gap: 10px; }
        
        /* GÖKYÜZÜ VE BALON */
        #sky { position: relative; width: 100%; height: 250px; background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); overflow: hidden; border-radius: 15px; margin: 15px 0; border: 2px solid #eee; }
        #ground { position: absolute; bottom: 0; width: 100%; height: 20px; background: #2ecc71; }
        #balloon { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 50px; transition: bottom 1.5s ease-out; }
        
        /* LİDERLİK TABLOSU */
        #leaderboard-area { margin-top: 25px; background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        #leaderboard-list { max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .leader-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        .me { background: #e8f4fd; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-area">
        <div id="register-section">
            <h2>Yeni Kayıt 🎈</h2>
            <input type="text" id="ogrenciAdSoyad" placeholder="Ad Soyad">
            <input type="text" id="takmaAd" placeholder="Balon Rumuzu (Takma Ad)">
            <div class="row">
                <input type="text" id="sehir" placeholder="İl">
                <input type="text" id="ilce" placeholder="İlçe">
            </div>
            <input type="text" id="okul" placeholder="Okul Adı">
            <div class="row">
                <select id="sinif"><option value="">Sınıf</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
                <select id="sube"><option value="">Şube</option></select>
            </div>
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button class="btn-blue" onclick="register()">Kaydı Tamamla</button>
        </div>
        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
        <div id="login-section">
            <h3>Veli Girişi</h3>
            <input type="email" id="loginEmail" placeholder="E-posta">
            <input type="password" id="loginPassword" placeholder="Şifre">
            <button class="btn-green" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <div id="user-panel" style="display: none;">
        <h2 id="welcome-msg">Selam!</h2>
        <div id="sky"><div id="ground"></div><img id="balloon" src="https://cdn-icons-png.flaticon.com/512/1350/1350100.png"></div>
        <h3 style="color: #2980b9;">Yükseklik: <span id="display-height">0</span> m</h3>
        
        <div id="action-area">
            <input type="number" id="sayfaSayisi" placeholder="Bugün kaç sayfa okundu?">
            <button class="btn-yellow" onclick="yukseklikArtir()">Sayfaları Gönder 🚀</button>
        </div>
        <p id="lock-msg" style="display:none; color: #e67e22; font-weight: bold; text-align: center; background: #fff3cd; padding: 10px; border-radius: 8px;">⚠️ Bugünlük bu kadar! Yarın yine gel.</p>

        <div id="leaderboard-area">
            <h4>🎈 Sınıf Arkadaşların</h4>
            <div id="leaderboard-list">Yükleniyor...</div>
        </div>

        <button class="btn-red" onclick="logout()">Çıkış Yap</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="app.js"></script>
<script>
    const subeSelect = document.getElementById('sube');
    const harfler = "ABCÇDEFGĞHIİJKLMNOÖPRS"; 
    for (let i = 0; i < harfler.length; i++) {
        let option = document.createElement('option');
        option.value = harfler[i]; option.text = harfler[i];
        subeSelect.appendChild(option);
    }
</script>
</body>
</html>
