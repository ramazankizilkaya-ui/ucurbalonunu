<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçur Balonu - Okuma Takibi</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container">
        <div id="auth-area" style="display: block;">
            <h1>🎈 Uçur Balonu</h1>
            
            <div class="form-box">
                <h2>Kayıt Ol</h2>
                <input type="text" id="ogrenciAdSoyad" placeholder="Öğrenci Ad Soyad">
                <input type="text" id="takmaAd" placeholder="Balonuna Bir İsim Ver">
                <input type="number" id="sinif" placeholder="Sınıf (Örn: 2)">
                <input type="text" id="sube" placeholder="Şube (Örn: A)">
                
                <select id="sehir" onchange="ilceleriYukle()">
                    <option value="">İl Seçiniz</option>
                </select>
                
                <select id="ilce" disabled>
                    <option value="">İlçe Seçiniz</option>
                </select>

                <select id="okul">
                    <option value="">Okul Seçiniz</option>
                </select>

                <input type="email" id="email" placeholder="Veli E-posta">
                <input type="password" id="password" placeholder="Şifre Oluştur">
                <button onclick="register()">Kayıt Ol ve Başla</button>
            </div>

            <div class="form-box">
                <h2>Giriş Yap</h2>
                <input type="email" id="loginEmail" placeholder="E-posta">
                <input type="password" id="loginPassword" placeholder="Şifre">
                <button onclick="login()">Giriş Yap</button>
            </div>
        </div>

        <div id="user-panel" style="display: none;">
            <div id="admin-link-area"></div> 
            
            <header>
                <h1 id="welcome-msg">Selam!</h1>
                <button onclick="logout()" style="background:#e74c3c; margin-bottom: 10px;">Çıkış Yap</button>
            </header>

            <div class="sky">
                <div id="balloon-container"></div>
            </div>

            <div class="stats">Balonun Şuan: <span id="display-height">0</span> metrede!</div>
            
            <div class="form-box">
                <p>Bugün kaç sayfa kitap okudun?</p>
                <input type="number" id="sayfaSayisi" placeholder="Sayfa sayısı girin">
                <button onclick="yukseklikArtir()">Balonumu Uçur! 🚀</button>
            </div>

            <div class="leaderboard">
                <h3>Sınıf Sıralaması 🏆</h3>
                <div id="leaderboard-list"></div>
            </div>
        </div>
    </div>

    <script src="data.js" defer></script>
    <script src="app.js" defer></script>

</body>
</html>
