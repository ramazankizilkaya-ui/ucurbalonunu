<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Admin | Uçur Balonunu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div id="superadmin-area" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>🛠️ Okul Yönetimi</h2>
                <button onclick="logout()" class="logout-btn">Çıkış</button>
            </div>
            <div style="text-align: left; background: #f9f9f9; padding: 20px; border-radius: 15px;">
                <label>İl Seçin:</label>
                <select id="yeniOkulIl" onchange="yeniOkulIlceleriYukle()"></select>
                <label>İlçe Seçin:</label>
                <select id="yeniOkulIlce"></select>
                <input type="text" id="yeniOkulAd" placeholder="Okul Adı">
                <button onclick="okulEkle()" style="width:100%; background:#27ae60;">Okul Ekle</button>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
